name: Desktop Release (PyInstaller)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build (Windows)
        shell: pwsh
        run: |
          cd desktop-qt
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller --noconfirm --onefile --name control_center main.py
          if (!(Test-Path dist/control_center.exe)) { throw "Missing dist/control_center.exe" }
      - name: Release assets (Windows)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            desktop-qt/dist/control_center.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build (macOS)
        shell: bash
        run: |
          cd desktop-qt
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt pyinstaller
          pyinstaller --noconfirm --windowed --name Control_Center main.py
          test -d "dist/Control_Center.app"
          cd dist
          zip -r "Control_Center-macos.zip" "Control_Center.app"
      - name: Release assets (macOS)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            desktop-qt/dist/Control_Center-macos.zip

