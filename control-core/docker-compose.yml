services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=control_core
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/control_core
      - REDIS_URL=redis://redis:6379/0
      - SMTP_SERVER=${SMTP_SERVER:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@control-center.local}
      - SECRET_KEY=your-super-secret-key-change-it-in-prod
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - db
      - redis
      - mailhog

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/control_core
      - REDIS_URL=redis://redis:6379/0
      - SMTP_SERVER=${SMTP_SERVER:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@control-center.local}
      - SECRET_KEY=your-super-secret-key-change-it-in-prod
    depends_on:
      - db
      - redis
      - mailhog

  celery-beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/control_core
      - REDIS_URL=redis://redis:6379/0
      - SMTP_SERVER=${SMTP_SERVER:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@control-center.local}
      - SECRET_KEY=your-super-secret-key-change-it-in-prod
    depends_on:
      - db
      - redis
      - mailhog

volumes:
  postgres_data:
